version: '3.8'

services:
  cerebro:
    build: .
    ports:
      - "8080:8080"
    environment:
      API_PORT: 8080
      LOG_LEVEL: info
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT:-}
      SNOWFLAKE_USER: ${SNOWFLAKE_USER:-}
      SNOWFLAKE_PRIVATE_KEY: ${SNOWFLAKE_PRIVATE_KEY:-}
      SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE:-CEREBRO}
      SNOWFLAKE_SCHEMA: ${SNOWFLAKE_SCHEMA:-CEREBRO}
      CEDAR_POLICIES_PATH: /app/policies
    volumes:
      - ./policies:/app/policies:ro
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  default:
    name: cerebro-network
